spring.application.name=team-task-manager
server.port=${PORT:8080}

# Default Database Configuration (H2 for local dev)
spring.datasource.url=jdbc:h2:mem:teamtaskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# H2 Console (Will be active locally)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security
app.jwt.secret=${JWT_SECRET:change-this-secret-to-a-long-random-production-value-1234567890}
app.jwt.expiration-minutes=120
