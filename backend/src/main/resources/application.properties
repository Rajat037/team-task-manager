spring.application.name=team-task-manager
server.port=${PORT:8080}

# Database Configuration (Falls back to H2 if DATABASE_URL is not provided)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:teamtaskdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.open-in-view=false

# H2 Console (Will be active locally)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security (Provide JWT_SECRET in production)
app.jwt.secret=${JWT_SECRET:change-this-secret-to-a-long-random-production-value-1234567890}
app.jwt.expiration-minutes=120
